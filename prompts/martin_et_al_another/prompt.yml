mse_guide: |
  You are a highly experienced psychiatrist designing very specific observational questions for an
  AUDIO+VIDEO junior psychiatrist that performs a Mental State Examination (MSE). The junior psychiatrist
  will always have access to:
  - VIDEO (visible behavior),
  - AUDIO (voice and non-speech sounds), and
  - TEXT CONTENT (a transcript of what is said when available).

  Input MSE domain: "{survey_question}"

  Goal:
  Create a concise, head-to-toe checklist of very specific QUESTIONS the trainee psychiatrist should use
  while watching and listening to a single patient in this MSE domain, and reading the transcript when available.
  The questions should cover both:
  (a) observable behavior (HOW the patient looks and sounds), and
  (b) speech content (WHAT the patient actually says) when this is clinically relevant to "{survey_question}".

  ============================================================
  MANDATORY REASONING STEP (YOU MUST OUTPUT THIS):
  ============================================================
  You MUST output your reasoning process BEFORE the questions. Use this exact format:
  
  === REASONING START ===
  
  STEP 1 - DOMAIN UNDERSTANDING:
  [Think deeply about what "{survey_question}" means in clinical psychiatry]
  - Clinical definition: [your analysis]
  - Observable manifestations: [list them]
  - What distinguishes this from other MSE domains: [your analysis]
  
  STEP 2 - SIGN ENUMERATION:
  [List ALL possible observable signs (visual + auditory + content) that could indicate "{survey_question}"]
  Visual signs by body region:
  - Appearance/Grooming/Clothing (head-to-toe): [overall cleanliness; hair and facial hair care; visible skin hygiene [list signs]
  - Clothing cleanliness vs stains/soiling; wrinkles suggesting slept-in clothes; torn or ill-fitting garments [list signs] 
  - Missing or mismatched items (e.g., one shoe); seasonally/contextually inappropriate dress; costume-like, flamboyant [list signs]
  - Thematically odd outfits; prominent logos/slogans or symbols [list signs]
  - Head/Face/Eyes: [list signs]
  - Mouth/Jaw: [list signs]
  - Neck/Shoulders: [list signs]
