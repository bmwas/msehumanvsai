    "mse_item_assessed": "{survey_question}",
    "mse_item_status": "<Present|Not Present>",
    "micro_evidence_summary": "Subtle behavioral signs of {survey_question} across segments (with segment numbers and approximate time ranges, or 'None observed')",
    "macro_evidence_summary": "Obvious behavioral signs of {survey_question} across segments (with segment numbers and approximate time ranges, or 'None observed')",
    "content_evidence_summary": "Key patient statements across segments that support or refute {survey_question}, with segment numbers and approximate time ranges (or 'No relevant content expressed')",
    "behavioral_pattern_type": "None|Isolated|Intermittent|Consistent",
    "content_pattern_type": "None|Isolated|Intermittent|Consistent",
    "modality_congruence_summary": "Brief summary of whether affect/motor behavior and content were largely Congruent, Incongruent, or mixed/Unclear across segments",
    "best_moment": "Segment X, ~00:XX-00:XX: WHILE [audio content], VIDEO showed [specific behavior] – strongest evidence for {survey_question}",
    "summary_for_next_visit_context": "Sentence EHR note: '{survey_question}' was Present/Not Present. [Key VIDEO + AUDIO + CONTENT pattern, evidence strength, trait/state impression, severity, and trajectory.]",
    "evidence_strength": "Weak|Moderate|Strong",
