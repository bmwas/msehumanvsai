      - If you're unsure of exact words, re-listen and transcribe carefully, or mark as approximate.
    
    □ CHANGE TRACKING CHECK: Did you accurately compare to previous segments?
      - Re-check that "Better/Worse/Same" reflects actual change, not just current state.
    
    □ EVIDENCE-CONCLUSION ALIGNMENT: Does your "mse_item_status" actually match your evidence?
      - If you said "Present" but have mostly "No" answers, reconsider.
      - If you said "Not Present" but have several "Yes" answers, reconsider.
    
    □ CONFIDENCE CHECK: On a scale of 1-10, how confident are you in this assessment?
      - If below 7, go back and re-watch/re-listen to key moments.
    ─────────────────────────────────────────────────────────────────────
    
    ============================================================
    OUTPUT FORMAT - JSON ONLY
    ============================================================
    
    CRITICAL: "mse_item_status" MUST be EXACTLY one of two values:
    - "Present"     (evidence supports {survey_question})
    - "Not Present" (evidence does not support {survey_question})
    NO OTHER VALUES ALLOWED.
    
    For "key_moment", include EXACT time within this segment (e.g., "At 00:08-00:15: WHILE...")
    
    {{
      "mse_item_assessed": "{survey_question}",
      "mse_item_status": "Present OR Not Present (EXACTLY one value)",
      "micro_signs_observed": "Subtle signs with EXACT time ranges (e.g., 'At 00:05-00:10: fine tremor')",
      "macro_signs_observed": "Obvious signs with EXACT time ranges",
      "content_evidence": "Key statements with EXACT time, noting change vs previous (e.g., 'At 00:12: NEW statement...')",
      "change_from_previous": "Better|Worse|Same",
      "modality_congruence": "Congruent|Incongruent|Unclear",
      "key_moment": "At 00:XX-00:XX: WHILE [quote], [behavior] - MUST include exact time",
      "patient_quote": "Exact quote with time (e.g., 'At 00:15: I feel hopeless')",
      "reasoning": "Brief explanation with time references, noting changes from previous segments",
      "trajectory": "Stable|Improving|Worsening",
      "evidence_strength": "Weak|Moderate|Strong",
      "rating": "Normal|Minimal|Mild|Moderate|Marked|Severe|Extreme"
    }}
    
    RULES:
    - "mse_item_status" MUST be EXACTLY "Present" or EXACTLY "Not Present" - NO other values
    - All observations MUST include exact second timestamps within this segment
    - Start with {{ and end with }}
    - Output RAW JSON ONLY - no text before or after

meta_analysis_prompt: |
  FINAL DETERMINATION: "{survey_question}"
  
  ============================================================
  YOUR ONE AND ONLY QUESTION:
  Across ALL segments, is there observable evidence of "{survey_question}"?
  ============================================================
  
  **ONLY** focus on "{survey_question}" and **NOTHING ELSE**.
  
  SEGMENT OBSERVATIONS:
  {temporal_summary}
  (Segment-level JSON summaries for "{survey_question}" only: micro/macro behavior, content evidence, change, and modality visibility.)
   
  PRIOR VISIT CONTEXT:
  {prior_visit_summary}
  (Use this only as a baseline for prior presence/absence, severity, and trait- vs state-like impression for "{survey_question}".  
   Use it to judge trajectory (Stable/Improving/Worsening) and pattern_temporality, but do NOT override clear current-visit evidence.  
   If prior data are sparse or ambiguous, set pattern_temporality to "Unclear".)

  ============================================================
  TASK (THINK LIKE A CLINICIAN, NOT A STATISTICIAN)
  ============================================================
  INTERNAL REASONING (DO NOT OUTPUT):
  - You MAY use <think>...</think> for internal chain-of-thought.
  - Do 2 internal passes:
    PASS A: Draft decision + draft values for pattern types, severity, evidence strength, trajectory.
    PASS B: Adversarial self-check: look for the strongest counter-evidence and missing-data pitfalls ("Not visible"/"Cannot assess"),
            then revise if needed.
  - Your final response MUST NOT include any <think> tags and MUST be JSON ONLY as specified below.
  
  1. Read through all segment summaries with one question in mind:
     - "Across these segments, do I see or hear any real evidence of '{survey_question}'?"
     - Use all three modalities together (VIDEO, AUDIO, CONTENT).  
       "Not visible" and "Cannot assess" are missing data, not negative findings.

  2. Behavioral pattern (micro + macro):
     - Note in how many segments there is clear behavioral evidence FOR "{survey_question}".
     - Among segments where the relevant regions are visible, decide:
       * "None"        = No segments show behavioral evidence.
       * "Isolated"    = Only one segment (or one very brief moment) shows behavioral evidence.
       * "Intermittent" = A few segments show behavioral evidence, but less than half of observable segments.
       * "Consistent"  = Behavioral evidence appears in at least half of observable segments.
     - This gives you behavioral_pattern_type.

  3. Content pattern (ideation / thought content):
     - Note in how many segments the patient’s words directly support or refute "{survey_question}".
     - Among segments with intelligible, relevant speech, decide:
       * "None"        = No explicit content relevant to "{survey_question}".
       * "Isolated"    = One segment with clear explicit content for "{survey_question}".
       * "Intermittent" = A few segments with explicit content, but less than half of content-observable segments.
       * "Consistent"  = Explicit content in at least half of content-observable segments.
     - This gives you content_pattern_type.
     - For ideation/thought-content domains, a single clear positive segment ("Isolated") is enough to say there IS content evidence.

  4. Make the binary decision: Present vs Not Present.
     - You MUST decide one or the other; there is no "unclear" option.
     - Set "Present" if ANY clear positive evidence exists in ANY segment (behavioral or content):
       * behavioral_pattern_type ≠ "None" OR content_pattern_type ≠ "None" ⇒ "{survey_question}" is Present.
       * This includes Isolated, Intermittent, and Consistent patterns.
     - You may only set "Not Present" if:
       * There is NO clear positive evidence in ANY segment (behavioral_pattern_type = "None" AND content_pattern_type = "None"), AND
       * At least some relevant regions/content were directly observable and coded as "No" (not only "Not visible"/"Cannot assess").
     - Do NOT let missing data ("Not visible" / "Cannot assess") erase positive evidence.

  5. Judge congruence and severity:
     - Congruence:
       * Ask whether affect/motor behavior and speech content generally tell the same story about "{survey_question}"
         (Congruent), clearly clash (Incongruent), or are mixed/unclear.
       * Summarize this briefly in modality_congruence_summary.
     - Severity (Normal|Minimal|Mild|Moderate|Marked|Severe|Extreme):
       * Look at the worst clear example of "{survey_question}" across segments.
       * Then adjust up/down based on how often it appears (pattern type: Isolated vs Intermittent vs Consistent).

  6. Judge evidence strength:
     - Base this on how solid the overall picture feels:
       * "Weak"     = very little or ambiguous evidence, or much of the recording is missing/unobservable.
       * "Moderate" = some clear examples, but limited segments or some contradictions/missing data.
       * "Strong"   = multiple clear, converging examples across segments with good visibility/intelligibility.
     - Use behavioral_pattern_type, content_pattern_type, amount of missing data, and congruence to choose.

  7. Decide trait vs state using prior visit:
     - Compare current visit to {prior_visit_summary}:
       * "Likely trait-like" = similar signs and severity across multiple visits.
       * "Likely state-like" = new or clearly changed pattern vs prior visit.
       * "Unclear"           = prior information insufficient or mixed.
     - This is pattern_temporality.

  8. Write a short EHR-style summary for next visit:
     - About 5 sentences, focused on "{survey_question}".
     - Include:
       * Present vs Not Present.
       * behavioral_pattern_type and content_pattern_type.
       * evidence_strength and pattern_temporality.
       * Severity rating and trajectory vs prior visit.
     - Keep the tone descriptive, not speculative.

  NEVER consider other MSE domains - ONLY "{survey_question}".

  ============================================================
  OUTPUT FORMAT - JSON ONLY
  ============================================================
  
  RULES:
  - "mse_item_status" MUST be EXACTLY "Present" or EXACTLY "Not Present".
  - "best_moment" should include a segment number and an approximate time range (e.g., "Segment 2, ~00:05–00:12").
  - Start with {{ and end with }}.
  - Output RAW JSON ONLY – no text before or after.
  
