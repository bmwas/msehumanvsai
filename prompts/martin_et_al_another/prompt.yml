    "rating": "Normal|Minimal|Mild|Moderate|Marked|Severe|Extreme",
    "trajectory": "Stable|Improving|Worsening"
  }}
  FINAL DETERMINATION: "{survey_question}"
  
  ============================================================
  YOUR ONE AND ONLY QUESTION:
  Across ALL segments, is there observable evidence of "{survey_question}"?
  ============================================================
  
  **ONLY** focus on "{survey_question}" and **NOTHING ELSE**.
  
  SEGMENT OBSERVATIONS:
  {temporal_summary}
  (Segment-level JSON summaries for "{survey_question}" only: micro/macro behavior, content evidence, change, and modality visibility.)
   
  PRIOR VISIT CONTEXT:
  {prior_visit_summary}
  (Use this only as a baseline for prior presence/absence, severity, and trait- vs state-like impression for "{survey_question}".  
   Use it to judge trajectory (Stable/Improving/Worsening) and pattern_temporality, but do NOT override clear current-visit evidence.  
   If prior data are sparse or ambiguous, set pattern_temporality to "Unclear".)
  
  TASK:
  1. Review all segments for evidence ONLY related to "{survey_question}".
     Integrate all three modalities (video, audio, transcript-based content) when interpreting each segment.
     Do NOT treat "Not visible" or "Cannot assess" as evidence against "{survey_question}" – they are missing data.
  
  2. For behavioral evidence (micro + macro):
     - Count how many segments showed micro behavioral signs of "{survey_question}".
     - Count how many segments showed macro behavioral signs of "{survey_question}".
     - Count how many segments allowed behavioral observation (relevant regions visible).
     - Classify the BEHAVIORAL PATTERN across segments as:
       * "None"        = No segments with positive behavioral evidence.
       * "Isolated"    = Positive behavioral evidence in only one segment (or one very brief moment).
       * "Intermittent" = Positive behavioral evidence in more than one but fewer than half of observable segments.
       * "Consistent"  = Positive behavioral evidence in at least half of observable segments.
  
  3. For speech content (ideation/thought-content) evidence:
     - Count how many segments contain explicit speech content directly supporting or refuting "{survey_question}".
     - Count how many segments have intelligible, relevant speech content that could have revealed such evidence.
     - Classify the CONTENT PATTERN across segments as:
       * "None"        = No explicit content relevant to "{survey_question}".
       * "Isolated"    = A single segment with clear explicit content for "{survey_question}".
       * "Intermittent" = Explicit content in more than one but fewer than half of content-observable segments.
       * "Consistent"  = Explicit content in at least half of content-observable segments.
  
  4. Apply appropriate decision rules (pattern describes *how often*, not *whether* it is present):
     - For primarily behavioral domains (e.g., tics, psychomotor changes, eye contact, motor agitation/retardation):
       * ANY behavioral_pattern_type other than "None" (Isolated/Intermittent/Consistent) means there IS behavioral evidence FOR "{survey_question}".
       * "Isolated" still counts as Present; it just indicates sparse behavioral expression.
       * Only when behavioral_pattern_type = "None" AND some relevant regions were actually observed with clear "No" calls can behavioral evidence support "Not Present".
     - For ideation/thought-content domains (e.g., suicidal ideation, delusions, hallucinations, pathological guilt, worthlessness):
       * ANY content_pattern_type other than "None" (Isolated/Intermittent/Consistent) means there IS content evidence FOR "{survey_question}".
       * A single clear, explicit content-positive segment ("Isolated" pattern) is sufficient to call "{survey_question}" Present if content is unambiguous (e.g., "I want to die", "They are watching me").
       * "None" for content means there was no explicit speech evidence for "{survey_question}".
  
  5. Quick cross-segment verification (before final decision):
     - Re-scan all segments with "Yes" calls to ensure the described evidence is specific and observable (not vague).
     - Re-scan segments with "No" calls to confirm the relevant regions/content were actually observable (not just "Not visible"/"Cannot assess").
     - Identify ALL segments that contain clear positive evidence (behavioral and/or content) for "{survey_question}" and use one of the clearest as the anchor for "best_moment".
  
  6. Decide: Is "{survey_question}" Present or Not Present overall?
     - This is a BINARY decision: choose exactly one of "Present" or "Not Present".
     - You MUST set "mse_item_status" to "Present" if ANY segment shows clear positive evidence (behavioral and/or content) for "{survey_question}".
       * This includes Isolated, Intermittent, and Consistent behavioral_pattern_type/content_pattern_type.
     - You may only set "Not Present" if:
       * There is NO clear positive evidence for "{survey_question}" in ANY segment, AND
       * At least some relevant regions/content were directly observable and coded as "No" (not only "Not visible"/"Cannot assess").
     - Weigh speech content as primary for ideation/thought-content domains, while still integrating behavioral evidence.
     - For behavioral domains, emphasize the behavioral_pattern_type (None/Isolated/Intermittent/Consistent) and severity.
     - Do NOT let "Not visible" or "Cannot assess" segments dilute positive evidence; they are missing data, not negatives.
     - Briefly note whether affect/motor behavior and content are broadly congruent, incongruent, or mixed, and whether this strengthens or weakens the case.
  
  7. Determine the overall severity rating (Normal|Minimal|Mild|Moderate|Marked|Severe|Extreme),
     using both:
     - Intensity of signs in the most informative segments, and
