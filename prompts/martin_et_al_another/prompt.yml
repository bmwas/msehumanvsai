decision_trace_prompt: |
  DECISION TRACE: "{survey_question}"
  
  **ONLY** focus on "{survey_question}" and **NOTHING ELSE**.
  
  INPUT:
  1) SEGMENT LOGS: {decision_trace_input}
  2) META-ANALYSIS: {final_diagnosis_text}
  3) PRIOR VISIT: {prior_visit_summary}
  
  TASK:
  Summarize the evidence for "{survey_question}" ONLY. Ignore all other MSE domains.
  You MUST include and integrate:
  - behavioral (micro/macro) evidence from VIDEO,
  - acoustic evidence from AUDIO, and
  - speech content (key patient statements, from audio+transcript).
  
  INTERNAL REASONING (DO NOT OUTPUT):
  - You MAY use <think>...</think> for internal chain-of-thought.
  - Do 2 internal passes:
    PASS A: Build a compact evidence table (segment → time window → modality → observation → supports/against).
    PASS B: Consistency audit: ensure quoted timestamps are specific, and ensure "Not Present" is not concluded from missing data.
  - Your final response MUST NOT include any <think> tags and MUST use the exact output headers/structure below.
  
  Your decision trace MUST clearly answer:
  - WHAT: What was the final decision for "{survey_question}" (Present vs Not Present, rating, trajectory),
          what were the behavioral and content pattern types (None/Isolated/Intermittent/Consistent),
          what was the overall evidence strength (Weak/Moderate/Strong), and whether the pattern appeared
          trait-like or state-like.
  - WHY: Why did you arrive at that decision? Which specific behavioral signs, cross-modal congruence patterns,
         and speech content support it? How did the pattern across segments (None/Isolated/Intermittent/Consistent)
         influence your call?
  - HOW: How was the decision made step-by-step? Which segments, timeframes, and modalities were inspected,
         how consistent the evidence was across segments (Isolated vs Intermittent vs Consistent), how you
         handled contextual normalization (culture, age, language, situation), and how you weighed conflicting
         or missing data (e.g., "Not visible" / "Cannot assess")?
  
  You MUST explicitly reference:
  - Segment numbers (e.g., "Segment 1", "Segment 3") and, when possible, approximate time ranges
    (e.g., "around 00:20–00:40") to show WHERE in the video/audio the key evidence comes from.
  - WHICH modality each piece of evidence comes from (VIDEO, AUDIO, CONTENT), and how they converged or diverged
    (congruent vs incongruent).
  - HOW you handled missing data (e.g., segments where feet were Not visible or speech was Cannot assess)
    to make sure the reader understands the limits of the decision.
  - WHETHER the behavioral evidence pattern was None/Isolated/Intermittent/Consistent and whether the content
    evidence pattern was None/Isolated/Intermittent/Consistent, and how that influenced the final call and the
    evidence_strength rating.
  - If you concluded "{survey_question}" is Present based on:
    * An isolated but severe behavioral segment, or
    * An isolated but clear content-positive segment,
    you MUST explicitly state this and justify why a single segment was sufficient, given the broader context.
  
  OUTPUT FORMAT (USE THESE EXACT HEADERS AND LABELED STRUCTURE):
  
  === DECISION TRACE SUMMARY ===
  
  FINAL STATUS: [MUST be exactly one of: "Present" OR "Not Present" - NO other values allowed]
  
  WHAT (structured breakdown):
  - Status: Present OR Not Present (MUST match FINAL STATUS above)
  - Rating: Normal|Minimal|Mild|Moderate|Marked|Severe|Extreme
  - Trajectory: Stable|Improving|Worsening
  - Behavioral Pattern: None|Isolated|Intermittent|Consistent
  - Content Pattern: None|Isolated|Intermittent|Consistent
  - Evidence Strength: Weak|Moderate|Strong
  - Pattern Temporality: Likely trait-like|Likely state-like|Unclear
  
  WHY (cite specific evidence with EXACT time ranges):
  [Explain WHY you reached that decision. You MUST cite specific time ranges within segments, NOT just segment numbers.
   CORRECT format: "In Segment 2, between 00:05–00:12, I observed..."
   INCORRECT format: "Segment 2 shows..." (too vague - segments can be 15-60+ seconds long)
   Reference VIDEO + AUDIO + CONTENT evidence with exact timestamps.]
  
  HOW (step-by-step process):
  [Explain HOW you made the decision: which segments and time windows you reviewed, how you integrated
   micro/macro behavior with speech content, how you handled Not visible/Cannot assess data, and how
   this led to your final ratings.]
  
  === EVIDENCE FOR "{survey_question}" ===
  
  MICRO SIGNS (with exact time ranges):
