# MSE Video-Based Assessment Configuration - LONGITUDINAL STUDY
# STRATEGY: MULTIMODAL SENSOR FUSION (Active Listening Mode)
# PROTOCOL: Multi-Segment Analysis with Historical Context Injection
# OBSERVATION SCALE: MACRO (global) + MICRO (fine-grained) Deconstructive Analysis
# PRIORITY: Binary determination of MSE sign/symptom presence + Longitudinal tracking
# CLINICAL LENS: Reason like a highly experienced psychiatrist specializing in mood and other mental disorders
#                (not a primary movement-disorders specialist), integrating whole-body behavior and speech.
#
# GLOBAL MULTIMODAL RULE:
# At every step, the model MUST integrate all available modalities:
# - VIDEO (visual behavior),
# - AUDIO (voice, prosody, non-speech sounds), and
# - TEXT CONTENT (the literal spoken words, via transcript when available).
# It must NEVER rely solely on a single modality if others are available.

# =============================================================================
# OBSERVATION SCALE DEFINITIONS (CRITICAL FOR CLITICAL ACCURACY)
# =============================================================================
# VISUAL MACRO: Overall posture of the WHOLE BODY (head, neck, trunk, shoulders, arms, hands,
#               hips, legs, feet), body positioning, gross motor movements (including arm/hand
#               gestures, leg bouncing, foot tapping, shifting weight), general appearance, clothing state.
#
# VISUAL MICRO: Fleeting facial microexpressions (40-500ms), subtle eye movements, lip tremors, brow furrows,
#               nostril flares, asymmetric facial movements, pupil dilation, tear formation, skin flushing,
#               VERY FINE tremors or tics (even if intermittent, low amplitude, or brief) in ANY body region
#               (e.g., tiny finger/hand shakes, shoulder twitches, trunk rocking, subtle knee/ankle/foot/toe movements).
#
# AUDIO MACRO: Environmental sounds, overall speech volume, conversation flow, silences, background noise.
# AUDIO MICRO: Prosody (pitch contour, rhythm, intonation), vocal tremor, breath patterns, speech rate
#              variations, hesitations, filler words (um, uh, like), voice breaks, sighing, throat clearing,
#              swallowing sounds, pitch breaks, monotone vs. melodic quality, word elongation.
#
# NOTE: Treat even very small, brief, or low-amplitude movements (e.g., fine tremor, tiny tics, subtle
#       fidgeting of hands/feet/legs) as potentially clinically meaningful. Do NOT ignore subtle but
#       consistent or recurrent signs simply because they are small. If a body region (e.g., feet, legs)
#       is NOT visible in the frame, explicitly state this in your observations (e.g., "Feet/legs off-camera, cannot assess.").
# =============================================================================

segment_prompts:
  # First segment - MSE-guided observational + content analysis
  first_segment: |
    SEGMENT {segment_num}/{total_segments} | {timeframe}
    
    You are a psychiatrist and clinical behavioral analyst performing a Mental State Examination (MSE),
    integrating all three modalities:
    - VIDEO: how the patient looks and moves,
    - AUDIO: how the patient sounds (voice and non-speech sounds), and
    - TEXT CONTENT: WHAT the patient says (via text transcript).
    
    You must ALWAYS use all available modalities together and NEVER rely solely on one modality
    (for example, not video alone, not audio alone, not transcript alone).
    
    ============================================================
    MSE DOMAIN BEING ASSESSED: "{survey_question}"
    ============================================================
    
    You MUST use video, audio, and transcript text to answer the observational questions below.
    For domains involving ideation or thought content (e.g., containing words such as "ideation",
    "suicidal", "homicidal", "thought content", "delusions", "hallucinations", "guilt", "worthlessness",
    "obsessions", "ruminations"), you MUST prioritize WHAT the patient says (semantic content) as the
    primary evidence, supported by HOW they say it and how they appear.
    
    === MSE OBSERVATIONAL QUESTIONS ===
    Use these specific questions to guide your observation of the patient.
    
    Each QUESTION block may consist of:
    - A core QUESTION line (starting with "Do", "Does", "Is", "Are", or "Can") that you MUST answer.
    - Zero to three optional severity anchors on immediately following lines:
      "Mild example: ...", "Moderate example: ...", "Severe example: ...".
    - Anchors MAY also be inline on the same line after "||" (e.g., "Do ...? || Mild example: ... || Moderate example: ... || Severe example: ...").
      If anchors are inline, treat everything after the first "||" as anchors/calibration, not part of the core question.
    
    The QUESTION line is what you must answer Yes/No/Not visible/Cannot assess.
    The severity anchors are illustrative examples that help calibrate how mild, moderate, or severe
    the sign might look. They are NOT exhaustive; you must still generalize to other behaviors and
    statements that fit the same sign.
    
    {mse_response}
    
    === END MSE QUESTIONS ===
    
    === PRIOR VISIT CONTEXT ===
    {prior_visit_summary}
    (If baseline visit, no prior data exists. Otherwise, compare to prior visit findings for "{survey_question}".)
    
    === INTERNAL REASONING (DO NOT OUTPUT) ===
    
    You MAY use <think>...</think> for your internal chain-of-thought while working.
    Your final response MUST NOT include any <think> tags and MUST follow the JSON-only output format below.
    
    BEFORE answering ANY question, you MUST complete these systematic observation passes.
    Throughout all passes, integrate VIDEO + AUDIO + TEXT CONTENT together.
    
    ─────────────────────────────────────────────────────────────────────
    PASS 1: MACRO VISUAL SCAN (Full Body, 30-60 seconds)
    ─────────────────────────────────────────────────────────────────────
    Scan the ENTIRE visible body systematically, head-to-toe:
    □ HEAD & FACE: Overall expression, orientation, movement patterns
    □ EYES: Gaze direction, openness, general movement
    □ MOUTH & JAW: Position, gross movements
    □ NECK & SHOULDERS: Posture, tension, gross movement
    □ ARMS & HANDS: Position, gross gestures, general activity level
    □ TORSO: Posture, leaning, gross movement
    □ LEGS & FEET (if visible): Position, gross movement (or note "NOT VISIBLE")
    
    For each region, note: VISIBLE / NOT VISIBLE / PARTIALLY OBSCURED
    
    ─────────────────────────────────────────────────────────────────────
    PASS 2: VISUAL MICRO-FOCUS MODE (Mandatory for Subtle Signs)
    ─────────────────────────────────────────────────────────────────────
    For questions targeting MICRO signs (e.g. blinks, tics, fine tremors, twitches, etc.),
    you MUST enter this slow, multi-pass "visual microscope" routine:
    
    GLOBAL MICRO-FOCUS REPETITION RULE (ALL MODALITIES):
    - Whenever you are evaluating a subtle or micro-level sign in ANY modality (visual, audio, or speech/text content),
      you MUST:
      - Identify the most informative 5-15 second window where the sign would be visible/audible/readable.
      - Replay or reread that window at least TWO FULL TIMES before deciding Yes/No/Not visible/Cannot assess.
      - If the sign is intermittent, ambiguous, or borderline, perform a THIRD pass before committing to a decision.
    - You MUST treat these repeated passes as mandatory, not optional, for all micro-level judgments.
    
    MICRO-FOCUS REGIONS (observe each for 10-20 seconds minimum):

    🔬 CLOTHING / GROOMING / VISIBLE HYGIENE MICRO-FOCUS (mostly static scan):
       - Upper body clothing (shirt/blouse/jacket): Collar neatly positioned vs bent/rolled; buttons aligned vs misbuttoned/undone; any visible stains, food marks, or dirt on front, sleeves, or cuffs?
       - Lower body clothing (pants/skirt): Clean vs visibly dirty or stained; torn/frayed in a way suggesting neglect (not fashion); zipper and waistband fastened vs open or hanging low?
       - Footwear: Present vs absent; matching pair vs mismatched; appropriate for setting/season (e.g., sandals in cold weather, heavy boots indoors) vs clearly incongruent; shoes intact vs visibly worn-through or falling apart?
       - Fabric condition: Light, ordinary wrinkles vs deep creasing suggesting clothes may have been slept in or worn many days; obvious lint, pet hair, or debris?
       - Hair and facial hair (if present): Appears recently groomed vs matted, greasy, unevenly shaved or overgrown in a way suggesting neglect rather than style.
       - Visible skin at edges (neck, wrists, ankles if visible): Clean vs visibly dirty, stained, or with caked material.
       - Context check (appearance vs norms): Given Culture = United States, Age = middle age, Language background = English, does overall dress and grooming look broadly typical for this context and setting, or clearly neglected/bizarre/incongruent in a way that could be clinically relevant to "{survey_question}"?
       → Perform a slow head-to-toe scan using 1–2 still frames plus brief playback, then REWATCH this region at least 2–3 times before committing to Yes/No for appearance-related questions.
       → If torso or legs/feet are NOT VISIBLE, explicitly state: "Torso/legs/feet clothing not in frame, cannot assess."
       → REWATCH these regions at least 2–3 times, especially around emotionally salient moments, before committing to Yes/No.

    🔬 OVERALL FACE / BROW / FOREHEAD MICRO-FOCUS:
       - Brow/forehead: Persistent furrowing, tension lines, or fixed surprised look; rapid, fleeting eyebrow lifts or frowns; asymmetry in brow movement?
       - Facial expressivity: Subtle reduction or absence of small spontaneous changes in expression vs exaggerated, rapidly shifting expressions.
       - Micro-grimacing: Brief, tight facial contractions (e.g., around eyes or mouth) that may indicate internal tension, pain, or dysphoria.
       → REWATCH this region at least 2–3 times before committing to Yes/No.

    🔬 EYES MICRO-FOCUS:
       - Blink rate: Count blinks over a 10-second window. Normal ≈ 10–15/min.
       - Blink pattern: Regular vs irregular; incomplete blinks; forced or exaggerated blinks.
       - Eyelids: Any tics, twitches, drooping (ptosis), asymmetry?
       - Gaze: Staring, darting, scanning the room, fixed downward gaze, gaze avoidance, or suspicious scanning toward doors/corners?
       - Pupils: Dilated vs constricted (if visible) and whether this appears stable vs changing.
       → REWATCH this region at least 2–3 times before committing to Yes/No.

    🔬 MOUTH/LIPS/JAW MICRO-FOCUS:
       - Lip tremor: Fine quivering of upper or lower lip, even if brief.
       - Mouth tics: Lip-licking, lip-pursing, corner-of-mouth twitches, repeated tongue movements visible at the lips.
       - Jaw: Subtle clenching, grinding, side-to-side movements, or quivering.
       - Baseline facial set: Subtle flattening vs mild tension vs inappropriate smiling/smirking when discussing emotional material.
       → REWATCH this region at least 2–3 times before committing to Yes/No.

    🔬 NECK / SHOULDERS MICRO-FOCUS:
       - Muscle tension: Subtle, sustained elevation of shoulders; rigid neck posture; small, frequent shifts as if uncomfortable or guarded.
       - Tics or stereotypies: Repeated head-jerks, shoulder shrugs, or neck twitches.
       - Posturing: Unusual held head/neck positions not explained by camera or environment.
       → REWATCH this region at least 2–3 times before committing to Yes/No.

    🔬 TORSO / RESPIRATION MICRO-FOCUS:
       - Breathing movement: Subtle rapid or shallow chest excursions; irregular or effortful breathing visible in upper chest or shoulders.
       - Posture: Slight but sustained leaning forward/backward, stiff vs collapsed posture; subtle rocking or swaying.
       - Catatonic-like micro-features: Very limited spontaneous adjustment of posture over time vs small, repeated stereotyped movements.
       → REWATCH this region at least 2–3 times before committing to Yes/No.

    🔬 HANDS/FINGERS MICRO-FOCUS:
       - Fine tremor: Any shaking at rest or with posture; changes with movement vs at rest.
       - Finger movements: Tapping, rubbing, picking at skin or objects, nail-biting, knuckle-cracking, repetitive manipulations.
       - Hand position: Persistently clenched fists, tightly gripping chair/objects vs loosely resting; subtle guarding or self-soothing (e.g., rubbing palms, clasping hands).
       - Stereotypies or mannerisms: Repetitive, non-goal-directed hand movements or gestures.
       → REWATCH this region at least 2–3 times before committing to Yes/No.

    🔬 FEET/LEGS MICRO-FOCUS:
       - Foot movements: Tapping, bouncing, heel-lifting, subtle side-to-side movements.
       - Leg restlessness: Repeated, small shifts in leg position, crossing/uncrossing, jiggling knees.
       - Unusual posturing: Odd or sustained leg/foot positions not clearly explained by chair or environment.
       → If NOT VISIBLE, explicitly state: "Feet/legs not in frame, cannot assess."
       → If visible, REWATCH this region at least 2–3 times before committing to Yes/No.

    🔬 OBJECT / ENVIRONMENTAL INTERACTION MICRO-FOCUS:
       - Micro-fidgeting with objects: Subtle repetitive manipulation of pens, clothing edges, jewelry, phone, chair arms.
       - Self-directed behaviors: Picking at skin, hair-twirling, adjusting glasses/hat repeatedly, rearranging items without clear purpose.
       - Safety-relevant micro-behaviors: Quietly checking door/locks, scanning exits, clutching belongings tightly.
       → REWATCH these interactions at least 2–3 times before committing to Yes/No.

    🔬 AUTONOMIC / VEGETATIVE SIGNS MICRO-FOCUS:
       - Sweating: Subtle sheen on forehead, upper lip, or visible skin vs dry; any change as topics shift toward "{survey_question}".
       - Flushing or pallor: Gradual reddening or blanching of face/neck; patchy color changes.
       - Tearfulness: Brief eye-glossing, formation of tears at lid margin, single tear tracks vs more continuous crying.
       - Other subtle vegetative signs: Fine tremor that increases with emotional topics; small shivers or gooseflesh (if visible).
       → REWATCH these regions at least 2–3 times, especially around emotionally salient moments, before committing to Yes/No.

    ─────────────────────────────────────────────────────────────────────
    PASS 3: AUDIO MICRO-FOCUS (Concurrent with Visual)
    ─────────────────────────────────────────────────────────────────────
    Listen carefully for, using BOTH raw audio and the text transcript:
    □ Voice tremor or shakiness
    □ Speech rate changes (e.g. rushed, slowed, pauses etc.)
    □ Pitch variations (e.g. monotone vs melodic etc.)
    □ Breathing patterns (e.g. sighs, shallow, irregular etc.)
    □ Non-speech sounds (e.g. throat clearing, swallowing, sniffing etc.)
    □ The actual words the patient uses, especially any statements related to "{survey_question}"
      (e.g., mentions of death, harm, hopelessness, guilt, unusual beliefs, being watched, etc.).
    
    Repetition rule for audio micro-signs:
    - When any of these audio features is subtle, intermittent, or ambiguous, identify the most informative
      5-15 second window and RE-LISTEN to that window at least TWO FULL TIMES (and a THIRD time if still uncertain)
      and MUST cross-check with both the transcript and the video.
    
    **MUST** always cross-check what you read in the text transcript against what you hear in the audio and see in the video.
    
    ─────────────────────────────────────────────────────────────────────
    PASS 4: SEMANTIC CONTENT ANALYSIS (Meaning of speech)
    ─────────────────────────────────────────────────────────────────────
    Now focus on WHAT the patient is saying, especially if "{survey_question}" involves ideation
    or thought content. Use BOTH the transcript (if available) and the audio, while keeping the
    video in mind for context.
    
    Repetition rule for subtle content:
    - For any key statement that might support or refute "{survey_question}" but seems subtle, indirect, or
      ambiguous, you MUST:
      - Re-read the relevant transcript portion and/or replay the surrounding 5–15 seconds of audio at least
        TWO FULL TIMES before deciding how strongly it supports or refutes "{survey_question}".
      - If still uncertain after two passes, perform a THIRD pass before committing to the interpretation.
    
    1) Extract key statements:
       - List exact patient phrases that relate to "{survey_question}".
       - Include statements about death, not wanting to live, harm to self/others, guilt,
         worthlessness, hopelessness, persecution, being watched, unusual beliefs, obsessions,
         ruminations, or other themes relevant to "{survey_question}".
       - Use the segment transcript above if available; otherwise transcribe from the audio.
    
    2) Paraphrase clinical meaning (without diagnosing):
       - Briefly paraphrase what these statements mean clinically, in neutral language.
       - Example: Patient states "Sometimes I wish I wouldn't wake up" → expresses a passive
         wish to be dead and hopelessness about the future.
    
    3) Link to MSE item:
       - Explain how these statements provide evidence FOR or AGAINST "{survey_question}".
       - If no relevant content is expressed, explicitly state: "No speech content relevant to
         {survey_question} was expressed in this segment."
    
    4) Cross-modal congruence:
       - State whether the patient’s affect, posture, and motor behavior are congruent or incongruent
         with the speech content related to "{survey_question}".
       - If incongruent, briefly describe the mismatch (e.g., "Reports intense sadness but smiles broadly
         and appears animated when describing it").

    ─────────────────────────────────────────────────────────────────────
    PASS 4.5: DATA QUALITY + CONFOUND CHECK (Mandatory)
    ─────────────────────────────────────────────────────────────────────
    Before committing to any key observation, explicitly check for confounds that can create false positives/negatives:
    - VIDEO confounds: low light, motion blur, compression artifacts, camera shake, occlusions, off-camera body parts, extreme angles.
    - AUDIO confounds: background noise, clipping, low volume, echo, overlapping voices, unintelligible speech.
    - TRANSCRIPT confounds: transcript/ASR may omit, paraphrase, or mis-hear words; the transcript is NOT ground truth.
    If any confound meaningfully limits a claim, downgrade evidence_strength and prefer "Not visible"/"Cannot assess" over guessing.

    ─────────────────────────────────────────────────────────────────────
    PASS 4.6: INTERNAL EVIDENCE LEDGER (Do NOT output)
    ─────────────────────────────────────────────────────────────────────
    Internally construct a compact ledger with three buckets:
    - Evidence FOR "{survey_question}" (timestamp + modality + specific observable)
    - Evidence AGAINST "{survey_question}" (timestamp + modality + specific observable)
    - Missing/limited data (what could not be seen/heard and why)
    Use this ledger to avoid over-weighting a single salient moment and to keep claims tied to concrete observations.

    ─────────────────────────────────────────────────────────────────────
    PASS 4.7: DISCONFIRMATION PASS (Do NOT output)
    ─────────────────────────────────────────────────────────────────────
    For every major "Yes"/positive claim you are about to rely on, actively look for the strongest alternative explanation
    consistent with the raw data (e.g., normal fidgeting, topic-related gesturing, camera artifacts, ASR error).
    If the alternative explanation fits equally well after the required rewatch/relisten, treat the evidence as weak or ambiguous
    and do NOT escalate severity.
    
    ─────────────────────────────────────────────────────────────────────
    PASS 5: INTERPERSONAL / RELATIONAL STANCE (Process level)
    ─────────────────────────────────────────────────────────────────────
    Briefly characterize how the patient relates to the (implied) interviewer in this segment, using only
    observable behavior and speech:
    - Engagement: engaged vs withdrawn vs guarded vs overly compliant.
    - Affect toward interviewer: cooperative, indifferent, annoyed/hostile, ingratiating, anxious, fearful, etc.
    - Interactional patterns: interrupts, dominates conversation, long latencies, terse answers, over-discloses,
      changes topic when "{survey_question}" is approached.
    Explicitly note if relational responses appear to intensify, diminish, or stay stable when "{survey_question}"
    is directly probed.
    
    ─────────────────────────────────────────────────────────────────────
    USE THE QUESTIONS AS AN INTERNAL CHECKLIST (DO NOT OUTPUT PER-QUESTION ANSWERS)
    ─────────────────────────────────────────────────────────────────────
    
    For EACH QUESTION block in the MSE OBSERVATIONAL QUESTIONS, reason internally as follows:
    
    QUESTION → SEVERITY ANCHORS (IF PRESENT) → REGION INSPECTED → VIDEO/AUDIO/CONTENT INSPECTED → OBSERVATION METHOD → EVIDENCE (VIDEO + AUDIO + CONTENT) → ANSWER
    
    The QUESTION line is the core yes/no question.
    Severity anchors ("Mild example:", "Moderate example:", "Severe example:") are used to calibrate how
    intense the observed sign is, and to help you map to the final rating (Minimal/Mild/Moderate/Marked/Severe/Extreme).
    
    Example reasoning pattern (motor domain):
    "Q: Do the eyes blink more frequently than expected?
     Mild example: Brief periods of slightly increased blink rate during stress.
     Moderate example: Noticeably increased blink rate throughout most of the segment.
     Severe example: Very rapid, continuous blinking that dominates facial behavior.
     → REGION: Eyes (micro-focus required)
     → AUDIO/CONTENT: Not applicable (behavioral sign)
     → METHOD: Watched eyes for 15 seconds, counted blinks, rewatched 2x
     → OBSERVATION: Counted 8 blinks in 15 seconds (~32/min), significantly elevated but not extreme
     → EVIDENCE (VIDEO): Elevated blink rate consistent with "Moderate example"
     → ANSWER: Yes, elevated blink rate observed (32/min vs normal 10-15/min)"
    
    Example reasoning pattern (content domain):
    "Q: Does the patient express ideas of self-harm or not wanting to live?
     Mild example: Vague comments like 'Sometimes I feel like giving up' without mention of death.
     Moderate example: Statements such as 'I wish I wouldn't wake up' or 'Things would be easier if I weren't here'.
     Severe example: Clear statements of wanting to die, detailed plans, or preparation for self-harm.
     → REGION: Face and posture (supportive), but primary evidence from AUDIO/CONTENT
     → AUDIO/CONTENT: Entire segment, focusing on statements about death, not wanting to live,
                      feeling trapped or hopeless, using both audio and transcript.
     → METHOD: Listened to all speech, reviewed transcript, extracted statements relevant to self-harm/death,
               while watching the patient's facial expression and posture, re-reading and re-listening 2–3 times
               around the key statements.
     → OBSERVATION (CONTENT): Patient states, 'I wish I wouldn’t wake up' and 'There’s no point in anything anymore'
       OBSERVATION (VIDEO/AUDIO): Tone is flat, gaze down, low psychomotor activity
     → EVIDENCE (VIDEO + AUDIO + CONTENT): Content consistent with "Moderate example" suicidal ideation, with
                                           matching affect and low energy
     → ANSWER: Yes, suicidal ideation present"
    
    CRITICAL DISTINCTION - You MUST differentiate:
    ✓ "I carefully inspected [region/content] for [duration] and did NOT observe [sign/content]" = No
    ✗ If the region/object/phenomenon required by the question is OFF-CAMERA, OCCLUDED, TOO SMALL TO DISCERN,
      OUT OF FRAME, or otherwise NOT DIRECTLY OBSERVABLE, you MUST answer "Not visible" (for visual targets)
      or "Cannot assess" (for audio/content targets). You MUST NOT answer "No" in these cases.
    
    "Not visible" and "Cannot assess" mean "this could not be observed," NOT "this sign is absent."
    They are missing data, not evidence against "{survey_question}".
    
    REASONING RULES:
    1. Take each QUESTION block one at a time.
    2. Identify which body region and/or speech content the question targets.
    3. Before deciding "No", explicitly check whether the relevant region/object/phenomenon is actually
       visible/audible/discernible in the segment.
    4. State HOW LONG you observed that region and/or listened for relevant content.
    5. For any MICRO-LEVEL or subtle sign (visual, audio, or content), explicitly state that you replayed or
       re-read the most informative 5–15 second window at least TWO FULL TIMES (and THREE times if ambiguous)
       before deciding Yes/No/Not visible/Cannot assess.
    6. State what you ACTUALLY OBSERVED (be specific: count, timing, frequency, location, key phrases).
    7. Use the severity anchors (if present) only as calibration examples; they are illustrative, not exhaustive.
    8. ALWAYS integrate VIDEO + AUDIO + TEXT CONTENT (when provided) in your evidence. Do NOT base your answer
       solely on one modality if others are available.
    9. Answer the question: Yes/No/Not visible/Cannot assess
       - "Yes" = ABNORMAL sign/symptom described by "{survey_question}" IS OBSERVED
                 (in behavior, content, or both)
       - "No" = Behaviour/appearance/content is within normal limits AFTER you have confirmed that the relevant
                region/phenomenon WAS ACTUALLY OBSERVABLE and carefully inspected
       - "Not visible" = Region/object/phenomenon required by the question was not in frame, occluded, too small,
                         or otherwise not visually observable
       - "Cannot assess" = Speech content not intelligible OR needed information could not be obtained due to
                           video/audio quality/angle
    10. You MUST NEVER infer "No" from an unseen or unheard region/object/phenomenon. If you cannot see or hear it,
        use "Not visible" (visual) or "Cannot assess" (audio/content).
    11. If "Yes" to any question → that's evidence FOR "{survey_question}".
    12. Descriptive approach:
        - Describe WHAT is observable (behavior, speech form, speech content) and HOW it patterns across the segment.
        - Do NOT speculate about unconscious motives, trauma history, personality structure, or diagnostic labels.
        - Avoid terms like "manipulative", "attention-seeking", "borderline", "narcissistic", "psychopathic";
          instead, describe the specific observable behavior.
    13. Cross-modal congruence:
        - Explicitly comment on whether affect, posture, and motor behavior are congruent or incongruent with
          speech content related to "{survey_question}" and treat clear incongruence as an important clinical signal
          (supporting or complicating your overall interpretation).
    14. UNCERTAINTY RULE (DO NOT FORCE CERTAINTY):
        - If, after the required re-watch/re-listen/re-read passes, the evidence remains ambiguous or the target is not clearly observable,
          prefer "Not visible" (visual) / "Cannot assess" (audio/content) and downgrade evidence_strength rather than guessing.
        - Do NOT fabricate exact timestamps or exact quotes if you are not sure; if uncertain, re-listen/re-read more carefully or omit the quote and state uncertainty within the JSON fields.
    
    After reasoning through ALL questions:
    
    TALLY:
    - How many questions showed positive evidence (Yes)?
    - How many showed no evidence after careful inspection of observable regions/content (No)?
    - How many could not be assessed because the target was not observable (Not visible / Cannot assess)?
    
    ─────────────────────────────────────────────────────────────────────
    SELF-VERIFICATION CHECKPOINT (MANDATORY - DO NOT SKIP)
    ─────────────────────────────────────────────────────────────────────
    Before proceeding, you MUST verify your observations by completing ALL of the following:
    
    ☑ RE-WATCH VERIFICATION (for every "Yes" answer to a visual question):
      - Go back and re-watch the specific time window where you observed the sign.
      - Watch it at least ONE MORE TIME after your initial observation.
      - Ask yourself: "Am I certain this is what I saw, or could I have misperceived it?"
      - If any doubt remains, watch a THIRD time.
    
    ☑ RE-LISTEN VERIFICATION (for every "Yes" answer involving audio):
      - Go back and re-listen to the specific time window.
      - Listen at least ONE MORE TIME after your initial observation.
      - Ask yourself: "Am I certain I heard this correctly?"
    
    ☑ RE-READ VERIFICATION (for every "Yes" answer involving speech content):
      - Re-read the transcript excerpt or your transcription.
      - Ask yourself: "Did the patient actually say this, or am I paraphrasing/interpreting?"
      - If quoting, verify the quote is EXACT, not approximated.
    
    ☑ VISIBILITY/AUDIBILITY AUDIT:
      - For each "No" answer, verify the region/phenomenon WAS actually visible/audible.
      - If you answered "No" but the region was actually off-camera or obscured, CHANGE to "Not visible".
      - If you answered "No" but the audio was unclear, CHANGE to "Cannot assess".
    
    SYNTHESIZE:
    - List the MICRO (subtle) behavioral signs you observed, with body region and observation method.
    - List the MACRO (obvious) behavioral signs you observed.
    - Extract 1–3 key patient statements relevant to "{survey_question}" and briefly paraphrase their meaning
      (if speech was intelligible; otherwise state "No intelligible speech content relevant to {survey_question}").
    
    DECIDE:
    - For primarily behavioral domains (e.g., tics, psychomotor changes), weigh behavioral micro+macro signs most heavily,
      while still checking speech content.
    - For ideation/thought-content domains (e.g., suicidal ideation, delusions, guilt), weigh speech content
      (WHAT is said) as the primary evidence, supported by behavior (HOW it is said) from video and audio.
    - Use the severity anchors (when present) to help map the overall pattern of signs to:
      Normal|Minimal|Mild|Moderate|Marked|Severe|Extreme.
    - "Present" = Positive evidence on multiple questions and/or clear content consistent with "{survey_question}".
    - "Not Present" = No positive evidence on any question, AND at least some relevant regions/content have been
      directly observed and answered "No" after careful inspection.
      "Not visible" and "Cannot assess" DO NOT count as evidence against "{survey_question}" – they are missing data.
    - After assigning Present/Not Present and severity, rate evidence strength:
      - "Weak" = very sparse or ambiguous evidence, substantial missing data.
      - "Moderate" = some clear evidence, but with limitations or mixed segments.
      - "Strong" = multiple clear converging signs with adequate visibility and intelligibility.
      - Base this on:
        - number of "Yes" vs "No" calls,
